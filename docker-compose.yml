---
name: zwfm-liquidsoap
services:
  liquidsoap:
    image: ghcr.io/oszuidwest/zwfm-liquidsoap:2.4.5-next
    container_name: liquidsoap
    volumes:
      - ./scripts:/scripts
      - ./audio:/audio
      - ./stereotool:/var/cache/liquidsoap/
      - ./socket:/tmp/liquidsoap # Server socket
    environment:
      - TZ=${CONTAINER_TIMEZONE:-Europe/Amsterdam}
    env_file:
      - .env
    ports:
      - '0.0.0.0:${STEREOTOOL_WEB_PORT:-8080}:8080' # StereoTool GUI (TCP)
      - '0.0.0.0:8888:8888/udp' # SRT Input 1
      - '0.0.0.0:9999:9999/udp' # SRT Input 2
    command: /scripts/radio.liq
    restart: unless-stopped
    user: "liquidsoap:liquidsoap"
    # HLS window on tmpfs: host disk-full, read-only remounts and ownership
    # drift cannot break it. 64M is ~25x the default live window.
    tmpfs:
      - /hls:size=64m,uid=100,gid=101,mode=0755
