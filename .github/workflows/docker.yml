---
name: Docker Build and Publish

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if version exists"
        required: false
        default: "false"
        type: boolean
  workflow_call:
  schedule:
    # Weekly rebuild so published images pick up Debian security updates
    - cron: "0 3 * * 1"

concurrency:
  group: docker-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Get Software Versions
        id: versions
        run: |
          # Read versions from Dockerfile ARGs
          LIQUIDSOAP_VERSION=$(grep "^ARG LIQUIDSOAP_VERSION" Dockerfile | cut -d'=' -f2)
          ODR_AUDIOENC_VERSION=$(grep "^ARG ODR_AUDIOENC_VERSION" Dockerfile | cut -d'=' -f2)
          COMBINED_TAG="$LIQUIDSOAP_VERSION-$ODR_AUDIOENC_VERSION"

          echo "Using Liquidsoap version: $LIQUIDSOAP_VERSION"
          echo "Using ODR-AudioEnc version: $ODR_AUDIOENC_VERSION"
          echo "Combined tag: $COMBINED_TAG"

          {
            echo "liquidsoap_version=$LIQUIDSOAP_VERSION"
            echo "odr_audioenc_version=$ODR_AUDIOENC_VERSION"
            echo "combined_tag=$COMBINED_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU for Update Check
        if: github.event_name == 'schedule'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Determine if Build Is Needed
        id: check_version
        env:
          COMBINED_TAG: ${{ steps.versions.outputs.combined_tag }}
          EVENT_NAME: ${{ github.event_name }}
          FORCE_BUILD: ${{ inputs.force_build }}
          GH_TOKEN: ${{ github.token }}
          IMAGE: ghcr.io/${{ github.repository }}:latest
          REPOSITORY: ${{ github.repository }}
        run: |
          if [[ "$FORCE_BUILD" == "true" ]]; then
            echo "Force build enabled, proceeding with build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          REPO_NAME=$(basename "$REPOSITORY")
          ORG_NAME=$(dirname "$REPOSITORY")

          echo "Checking if version exists: $COMBINED_TAG"
          EXISTING_TAGS=$(gh api "orgs/${ORG_NAME}/packages/container/${REPO_NAME}/versions" \
                          --paginate 2>/dev/null | \
                          jq -r '.[].metadata.container.tags[]?' 2>/dev/null | \
                          sort -V || echo "No versions found or API error")

          echo "Existing versions:"
          echo "$EXISTING_TAGS"
          echo "---"

          if ! grep -Fxq -- "$COMBINED_TAG" <<< "$EXISTING_TAGS"; then
            echo "Version not found. Will build: $COMBINED_TAG"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" != "schedule" ]]; then
            echo "Version already exists: $COMBINED_TAG"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Skip only when both platform checks succeed without pending upgrades
          for PLATFORM in linux/amd64 linux/arm64; do
            echo "Checking package updates for $PLATFORM"
            if ! docker run --rm --platform "$PLATFORM" --user root --entrypoint sh "$IMAGE" -c \
              'apt-get update -qq && apt-get -s upgrade >/tmp/upgrades && ! grep -q "^Inst " /tmp/upgrades'; then
              echo "Scheduled build required for $PLATFORM"
              echo "should_build=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "Published image is up to date on both platforms"
          echo "should_build=false" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU for Build
        if: github.event_name != 'schedule' && steps.check_version.outputs.should_build == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.check_version.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: steps.check_version.outputs.should_build == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and Push Docker Image
        if: steps.check_version.outputs.should_build == 'true'
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          provenance: false
          build-args: |
            LIQUIDSOAP_VERSION=${{ steps.versions.outputs.liquidsoap_version }}
            ODR_AUDIOENC_VERSION=${{ steps.versions.outputs.odr_audioenc_version }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.versions.outputs.combined_tag }}
            ${{ github.ref == 'refs/heads/main' && format('ghcr.io/{0}:latest', github.repository) || '' }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
            org.opencontainers.image.revision=${{ github.sha }}
            liquidsoap.version=${{ steps.versions.outputs.liquidsoap_version }}
            odr-audioenc.version=${{ steps.versions.outputs.odr_audioenc_version }}

      - name: Build Summary
        if: steps.check_version.outputs.should_build == 'true'
        env:
          COMBINED_TAG: ${{ steps.versions.outputs.combined_tag }}
          DIGEST: ${{ steps.build.outputs.digest }}
          FORCE_BUILD: ${{ inputs.force_build }}
          IMAGE: ghcr.io/${{ github.repository }}:${{ steps.versions.outputs.combined_tag }}
        run: |
          {
            echo "## Docker Build Completed Successfully"
            echo "- **Image Tag**: $COMBINED_TAG"
            echo "- **Image**: $IMAGE"
            echo "- **Digest**: $DIGEST"
            echo "- **Platforms**: linux/amd64, linux/arm64"
            if [[ "$FORCE_BUILD" == "true" ]]; then
              echo "- **Force Build**: Enabled"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Skip Build Summary
        if: steps.check_version.outputs.should_build == 'false'
        env:
          COMBINED_TAG: ${{ steps.versions.outputs.combined_tag }}
        run: |
          {
            echo "## Docker Build Skipped"
            echo "No build required for version $COMBINED_TAG"
            echo "Use 'Force build' option to rebuild existing version"
          } >> "$GITHUB_STEP_SUMMARY"

  cleanup:
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      # Every push of a rebuilt image orphans the previous manifest set
      # (manifest list + per-arch children) as untagged versions. This
      # deletes only truly unreferenced manifests; arch children of tagged
      # manifest lists are preserved.
      - name: Delete orphaned untagged images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          packages: zwfm-liquidsoap
          validate: true
